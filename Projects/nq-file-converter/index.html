<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        NQ & Outstanding Converter + Reporting
    </title>

    <link rel="stylesheet"
          href="styles.css">

    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

</head>

<body>

    <div class="container">

        <h1>
            NQ & Outstanding Converter + Reporting
        </h1>

        <div class="card">

            <h2>
                1. Select Process
            </h2>

            <select id="processType">

                <option value="NQ">
                    NQ Items
                </option>

                <option value="OUTSTANDING">
                    Outstanding Items
                </option>

            </select>

        </div>

        <div class="card">

            <h2>
                2. Upload Original File
            </h2>

            <input type="file"
                   id="sourceFile">

            <button onclick="processFile()">

                Generate Files

            </button>

        </div>

        <div class="card">

            <h2>
                3. Weekly Reporting
            </h2>

            <input type="file"
                   id="weeklyFiles"
                   multiple>

            <button onclick="generateWeeklyReport()">

                Generate Weekly Report

            </button>

        </div>

        <div id="message"></div>

    </div>

    <script src="app.js"></script>

</body>
</html>
