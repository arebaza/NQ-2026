<!doctype html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NQ File Converter</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js" defer></script>
  <script src="app.js" defer></script>
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>NQ File Converter</h1>
      <p>
        Upload the file that ends in<strong>- O.xlsx</strong>. This tool will create the two files required by the system:
        <strong>Team Recon Report NQ.xlsx</strong> and <strong>NQ by Accounts.xlsx</strong>.
      </p>

      <label for="inputFile" class="file-label">Select the - O Excel file</label>
      <input id="inputFile" type="file" accept=".xlsx,.xls" />

      <button id="convertBtn" type="button" disabled>Convert Files</button>

      <div id="message" class="message" aria-live="polite"></div>
    </section>
  </main>
</body>
</html>
