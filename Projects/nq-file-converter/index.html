<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NQ / Outstanding File Converter</title>

    <!-- SheetJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">
        <h1>NQ / Outstanding File Converter</h1>

        <label for="processType">Select Process:</label>
        <select id="processType">
            <option value="NQ">NQ Items</option>
            <option value="OU">Outstanding Items</option>
        </select>

        <br><br>

        <input type="file" id="fileInput" accept=".xlsx" />

        <br><br>

        <button onclick="processFile()">Convert File</button>

        <p id="status"></p>
    </div>

    <script src="app.js"></script>
</body>
</html>
